name: DAM Only Workflows - Dummy Workflow

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  workflow_call:  # Called by other workflows
    inputs:
      version:
        description: "Version parameter"
        required: false
        type: string
        default: "latest"  # Default if not provided

jobs:
  dummy_job:
    runs-on: ubuntu-latest

    steps:
      - name: Just a dummy step
        run: echo "This is a dummy workflow doing nothing."

      - name: Print Version
        run: |
          # Check if version was passed
          if [ -z "${{ inputs.version }}" ]; then
            echo "No version passed, using default."
            VERSION="latest"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "Version passed: $VERSION"
